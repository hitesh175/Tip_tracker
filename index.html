<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Tips</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --accent: #7b2ff7;
            --accent-soft: #f3ebff;
            --bg: #fdfdff;
            --text: #1d1d1f;
            --text-light: #86868b;
            --card: #ffffff;
            --success: #34c759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 15px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        header { margin: 30px 0 20px; width: 100%; }
        header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        header p { color: var(--text-light); margin: 5px 0 0; font-size: 14px; }

        /* Input Card */
        .input-card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            margin-bottom: 25px;
            border: 1px solid #f1f1f1;
        }

        .row { display: flex; gap: 12px; margin-bottom: 15px; }
        .group { flex: 1; }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--text-light); margin-bottom: 6px; padding-left: 4px; }
        
        input, select {
            background: #f5f5f7;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { background: #e8e8ed; }

        .btn-main {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Stats Section */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box {
            background: var(--accent-soft);
            padding: 20px;
            border-radius: 22px;
            text-align: center;
        }
        .stat-box.alt { background: #f2f2f7; }
        .stat-label { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .stat-box.alt .stat-label { color: var(--text-light); }
        .stat-val { font-size: 22px; font-weight: 800; }
        .stat-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }

        /* History List */
        .history-item {
            background: white;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f2f2f7;
        }
        .h-date { font-weight: 700; font-size: 15px; display: block; }
        .h-time { font-size: 13px; color: var(--text-light); }
        .h-amt { color: var(--success); font-weight: 800; font-size: 18px; }
        
        .actions { margin-top: 8px; }
        .act-btn { font-size: 12px; font-weight: 700; text-decoration: none; margin-right: 12px; }
        .edit { color: var(--accent); }
        .delete { color: #ff3b30; }

        #monthSelector { 
            background: none; 
            font-weight: 700; 
            padding: 0; 
            margin-bottom: 20px; 
            color: var(--accent); 
            cursor: pointer;
            width: auto;
        }
        .pdf-link { text-align: center; display: block; font-size: 13px; color: var(--text-light); text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Tips 💰</h1>
        <p>Keep track of your extra earnings.</p>
    </header>

    <div class="input-card">
        <div class="group" style="margin-bottom:15px;">
            <label>When was the shift?</label>
            <input type="date" id="date">
        </div>
        <div class="row">
            <div class="group"><label>Hours</label><input type="number" id="h_part" placeholder="0"></div>
            <div class="group"><label>Mins</label><input type="number" id="m_part" placeholder="0"></div>
        </div>
        <div class="group" style="margin-bottom:20px;">
            <label>Total Tips (€)</label>
            <input type="number" id="tips" step="0.01" placeholder="0.00">
        </div>
        <input type="hidden" id="editDocId" value="">
        <button id="mainBtn" class="btn-main" onclick="handleEntry()">Add to Tracker</button>
        <button id="cancelBtn" style="display:none; background:none; color:var(--text-light); border:none; width:100%; margin-top:10px; cursor:pointer;" onclick="resetForm()">Cancel Edit</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <select id="monthSelector" onchange="updateUI()"></select>
        <a href="#" class="pdf-link" onclick="downloadPDF()">Export PDF</a>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">This Week</div>
            <div class="stat-val" id="weekTips">€0.00</div>
            <div class="stat-sub" id="weekHours">0h 0m</div>
        </div>
        <div class="stat-box alt">
            <div class="stat-label">Month Total</div>
            <div class="stat-val" id="monthTips">€0.00</div>
            <div class="stat-sub" id="monthHours">0h 0m</div>
        </div>
    </div>

    <div id="historyBody"></div>
</div>

<script>
    // PASTE YOUR CONFIG FROM FIREBASE CONSOLE HERE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let shifts = [];

    function formatTime(decimalHours) {
        const h = Math.floor(decimalHours);
        const m = Math.round((decimalHours - h) * 60);
        return `${h}h ${m}m`;
    }

    function loadData() {
        db.collection("shifts").orderBy("date", "desc").onSnapshot((snapshot) => {
            shifts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            populateMonthSelector();
            updateUI();
        });
    }

    async function handleEntry() {
        const dateVal = document.getElementById('date').value;
        const h = parseInt(document.getElementById('h_part').value) || 0;
        const m = parseInt(document.getElementById('m_part').value) || 0;
        const tips = parseFloat(document.getElementById('tips').value) || 0;
        const editId = document.getElementById('editDocId').value;
        if (!dateVal) return;
        const data = { date: dateVal, hours: h + (m/60), tips: tips };
        if (editId) await db.collection("shifts").doc(editId).update(data);
        else await db.collection("shifts").add(data);
        resetForm();
    }

    function updateUI() {
        const container = document.getElementById('historyBody');
        container.innerHTML = '';
        const selMonth = document.getElementById('monthSelector').value;
        if(!selMonth) return;
        let mTips = 0, mHours = 0, wTips = 0, wHours = 0;
        const now = new Date();
        const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1))).setHours(0,0,0,0);

        shifts.forEach((s) => {
            const sDate = new Date(s.date + 'T00:00:00');
            if (s.date.startsWith(selMonth)) { mTips += s.tips; mHours += s.hours; }
            if (sDate >= startOfWeek) { wTips += s.tips; wHours += s.hours; }
            
            container.innerHTML += `
                <div class="history-item">
                    <div>
                        <span class="h-date">${s.date}</span>
                        <span class="h-time">${formatTime(s.hours)} shift</span>
                        <div class="actions">
                            <a href="#" class="act-btn edit" onclick="editShift('${s.id}')">Edit</a>
                            <a href="#" class="act-btn delete" onclick="deleteShift('${s.id}')">Delete</a>
                        </div>
                    </div>
                    <div class="h-amt">€${s.tips.toFixed(2)}</div>
                </div>`;
        });
        document.getElementById('monthTips').innerText = `€${mTips.toFixed(2)}`;
        document.getElementById('monthHours').innerText = formatTime(mHours);
        document.getElementById('weekTips').innerText = `€${wTips.toFixed(2)}`;
        document.getElementById('weekHours').innerText = formatTime(wHours);
    }

    function populateMonthSelector() {
        const selector = document.getElementById('monthSelector');
        const months = new Set([new Date().toISOString().substring(0,7)]);
        shifts.forEach(s => months.add(s.date.substring(0,7)));
        const current = selector.value;
        selector.innerHTML = Array.from(months).sort().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
        if(current) selector.value = current;
    }

    function editShift(id) {
        const s = shifts.find(x => x.id === id);
        document.getElementById('date').value = s.date;
        document.getElementById('h_part').value = Math.floor(s.hours);
        document.getElementById('m_part').value = Math.round((s.hours - Math.floor(s.hours)) * 60);
        document.getElementById('tips').value = s.tips;
        document.getElementById('editDocId').value = s.id;
        document.getElementById('mainBtn').innerText = "Update Shift";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    function deleteShift(id) { if(confirm("Remove this entry?")) db.collection("shifts").doc(id).delete(); }
    
    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('h_part').value = ""; document.getElementById('m_part').value = "";
        document.getElementById('tips').value = ""; document.getElementById('editDocId').value = "";
        document.getElementById('mainBtn').innerText = "Add to Tracker";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selMonth = document.getElementById('monthSelector').value;
        
        doc.setFontSize(20);
        doc.text(`Tips Summary: ${selMonth}`, 14, 20);
        
        const monthShifts = shifts.filter(s => s.date.startsWith(selMonth));
        let weeklyData = { 1:{t:0,h:0}, 2:{t:0,h:0}, 3:{t:0,h:0}, 4:{t:0,h:0}, 5:{t:0,h:0} };
        monthShifts.forEach(s => {
            const d = new Date(s.date + 'T00:00:00').getDate();
            const weekNum = Math.ceil(d / 7);
            if (weeklyData[weekNum]) { weeklyData[weekNum].t += s.tips; weeklyData[weekNum].h += s.hours; }
        });

        const rows = Object.keys(weeklyData).map(n => [`Week ${n}`, formatTime(weeklyData[n].h), `€${weeklyData[n].t.toFixed(2)}`]);
        doc.autoTable({ startY: 30, head: [['Week', 'Hours', 'Tips']], body: rows });
        doc.save(`MyTips_${selMonth}.pdf`);
    }

    document.getElementById('date').valueAsDate = new Date();
    loadData();
</script>
</body>
</html>
