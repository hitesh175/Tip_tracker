<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TipTracker | Analytics Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --brand: #2563eb;
            --brand-light: #eff6ff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --surface: #ffffff;
            --bg-app: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar Style */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.25rem; color: var(--brand); letter-spacing: -0.025em; }

        .main-content {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Layout Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 850px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .panel-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Styling */
        .form-control { margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-muted); }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--brand); outline: 2px solid var(--brand-light); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            width: 100%;
        }

        .btn-brand { background: var(--brand); color: white; }
        .btn-brand:hover { background: #1d4ed8; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); margin-top: 0.5rem; }

        /* Stats Cards */
        .stat-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .stat-mini {
            background: var(--brand-light);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #dbeafe;
        }
        .stat-mini span { display: block; font-size: 0.75rem; font-weight: 600; color: var(--brand); }
        .stat-mini b { font-size: 1.25rem; display: block; margin-top: 0.25rem; }

        /* Table/List View */
        .data-row {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1rem;
            transition: background 0.2s;
        }
        .data-row:hover { background: #fcfcfd; }
        .date-pill {
            background: var(--bg-app);
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .amount-text { font-weight: 700; color: var(--success); }
        .action-btns { display: flex; gap: 0.75rem; font-size: 0.8rem; }
        .action-btns span { cursor: pointer; font-weight: 600; }
        .edit-txt { color: var(--brand); }
        .del-txt { color: var(--danger); }
    </style>
</head>
<body>

<nav>
    <div class="logo">TipTracker <small style="font-weight: 400; opacity: 0.6;">v2.0</small></div>
    <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">Cloud Connected</div>
</nav>

<div class="main-content">
    <div class="dashboard-grid">
        
        <div class="sidebar">
            <div class="panel">
                <div class="panel-title">Add Entry</div>
                <div class="form-control">
                    <label>Shift Date</label>
                    <input type="date" id="date">
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                    <div style="flex: 1;">
                        <label>Hours</label>
                        <input type="number" id="h_part" placeholder="0">
                    </div>
                    <div style="flex: 1;">
                        <label>Minutes</label>
                        <input type="number" id="m_part" placeholder="0">
                    </div>
                </div>
                <div class="form-control">
                    <label>Tips (€)</label>
                    <input type="number" id="tips" placeholder="0.00">
                </div>
                <input type="hidden" id="editDocId" value="">
                <button id="mainBtn" class="btn btn-brand" onclick="handleEntry()">Post to Ledger</button>
                <button id="cancelBtn" class="btn btn-outline" style="display:none;" onclick="resetForm()">Cancel Update</button>
            </div>
            
            <div class="panel" style="margin-top: 1.5rem; background: #fafafa;">
                <div class="panel-title">Reports</div>
                <label>Filter Month</label>
                <select id="monthSelector" onchange="updateUI()" style="margin-bottom: 1rem;"></select>
                <button class="btn btn-outline" onclick="downloadPDF()" style="width: 100%;">Generate PDF Report</button>
            </div>
        </div>

        <div class="analytics">
            <div class="stat-group">
                <div class="stat-mini">
                    <span>Weekly Revenue</span>
                    <b id="weekTips">€0.00</b>
                    <small id="weekHours" style="opacity: 0.7;">0h 0m</small>
                </div>
                <div class="stat-mini" style="background: white; border: 1px solid var(--border);">
                    <span style="color: var(--text-muted);">Monthly Ledger</span>
                    <b id="monthTips">€0.00</b>
                    <small id="monthHours" style="opacity: 0.7; color: var(--text-muted);">0h 0m</small>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Transaction History</div>
                <div id="historyBody">
                    </div>
            </div>
        </div>

    </div>
</div>

<script>
    // 1. FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let shifts = [];

    function formatTime(decimalHours) {
        const h = Math.floor(decimalHours);
        const m = Math.round((decimalHours - h) * 60);
        return `${h}h ${m}m`;
    }

    function loadData() {
        db.collection("shifts").orderBy("date", "desc").onSnapshot((snapshot) => {
            shifts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            populateMonthSelector();
            updateUI();
        });
    }

    async function handleEntry() {
        const dateVal = document.getElementById('date').value;
        const h = parseInt(document.getElementById('h_part').value) || 0;
        const m = parseInt(document.getElementById('m_part').value) || 0;
        const tips = parseFloat(document.getElementById('tips').value) || 0;
        const editId = document.getElementById('editDocId').value;
        if(!dateVal) return;
        const data = { date: dateVal, hours: h + (m/60), tips: tips };
        if(editId) await db.collection("shifts").doc(editId).update(data);
        else await db.collection("shifts").add(data);
        resetForm();
    }

    function updateUI() {
        const container = document.getElementById('historyBody');
        container.innerHTML = '';
        const selMonth = document.getElementById('monthSelector').value;
        if(!selMonth) return;
        
        let mTips = 0, mHours = 0, wTips = 0, wHours = 0;
        const startOfWeek = new Date(new Date().setDate(new Date().getDate() - new Date().getDay() + (new Date().getDay() === 0 ? -6 : 1))).setHours(0,0,0,0);

        shifts.forEach((s) => {
            const sDate = new Date(s.date + 'T00:00:00');
            if(s.date.startsWith(selMonth)) { mTips += s.tips; mHours += s.hours; }
            if(sDate >= startOfWeek) { wTips += s.tips; wHours += s.hours; }
            
            container.innerHTML += `
                <div class="data-row">
                    <div class="date-pill">${s.date}</div>
                    <div>
                        <div style="font-weight: 600; font-size: 0.9rem;">Work Shift</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">${formatTime(s.hours)} recorded</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="amount-text">€${s.tips.toFixed(2)}</div>
                        <div class="action-btns">
                            <span class="edit-txt" onclick="editShift('${s.id}')">Edit</span>
                            <span class="del-txt" onclick="deleteShift('${s.id}')">Delete</span>
                        </div>
                    </div>
                </div>`;
        });
        document.getElementById('monthTips').innerText = `€${mTips.toFixed(2)}`;
        document.getElementById('monthHours').innerText = formatTime(mHours);
        document.getElementById('weekTips').innerText = `€${wTips.toFixed(2)}`;
        document.getElementById('weekHours').innerText = formatTime(wHours);
    }

    function populateMonthSelector() {
        const selector = document.getElementById('monthSelector');
        const months = new Set([new Date().toISOString().substring(0,7)]);
        shifts.forEach(s => months.add(s.date.substring(0,7)));
        const current = selector.value;
        selector.innerHTML = Array.from(months).sort().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
        if(current) selector.value = current;
    }

    function editShift(id) {
        const s = shifts.find(x => x.id === id);
        document.getElementById('date').value = s.date;
        document.getElementById('h_part').value = Math.floor(s.hours);
        document.getElementById('m_part').value = Math.round((s.hours - Math.floor(s.hours)) * 60);
        document.getElementById('tips').value = s.tips;
        document.getElementById('editDocId').value = s.id;
        document.getElementById('mainBtn').innerText = "Update Entry";
        document.getElementById('cancelBtn').style.display = "block";
    }

    function deleteShift(id) { if(confirm("Confirm deletion?")) db.collection("shifts").doc(id).delete(); }
    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('h_part').value = ""; document.getElementById('m_part').value = "";
        document.getElementById('tips').value = ""; document.getElementById('editDocId').value = "";
        document.getElementById('mainBtn').innerText = "Post to Ledger";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selMonth = document.getElementById('monthSelector').value;
        doc.setFontSize(18);
        doc.text(`Earnings Report: ${selMonth}`, 14, 20);
        const data = shifts.filter(s => s.date.startsWith(selMonth)).map(s => [s.date, formatTime(s.hours), `€${s.tips.toFixed(2)}`]);
        doc.autoTable({ startY: 30, head: [['Date', 'Time', 'Tips']], body: data });
        doc.save(`Report_${selMonth}.pdf`);
    }

    document.getElementById('date').valueAsDate = new Date();
    loadData();
</script>
</body>
</html>
