<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift & Tip Tracker Pro + PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --warning: #f39c12; --danger: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 150px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85em; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .add-btn { background: var(--success); color: white; }
        .pdf-btn { background: #5f6368; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .pdf-btn:hover { background: #3c4043; }

        .filter-section { background: #e8f0fe; padding: 15px; border-radius: 10px; margin: 20px 0; display: flex; align-items: center; gap: 10px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #eee; text-align: center; }
        .stat-val { font-size: 1.8em; font-weight: bold; color: var(--primary); }
        .stat-sub { font-size: 0.9em; color: #666; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f3f4; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .actions { display: flex; gap: 10px; }
        .edit-link { color: var(--primary); cursor: pointer; text-decoration: underline; font-weight: 600; }
        .del-link { color: var(--danger); cursor: pointer; text-decoration: underline; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h1>Shift & Tip Tracker</h1>
    
    <div class="form-row">
        <div class="form-group"><label>Date</label><input type="date" id="date"></div>
        <div class="form-group"><label>Hours</label><input type="number" id="hours" step="0.1"></div>
        <div class="form-group"><label>Tips (€)</label><input type="number" id="tips" step="0.01"></div>
    </div>
    <input type="hidden" id="editIndex" value="-1">
    <button id="mainBtn" class="add-btn" onclick="handleEntry()">Add Shift</button>
    <button id="cancelBtn" style="display:none; background:#6c757d; color:white;" onclick="resetForm()">Cancel Edit</button>

    <div class="filter-section">
        <label>📅 View Summary For:</label>
        <select id="monthSelector" onchange="updateUI()"></select>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Selected Week</h3>
            <div class="stat-val" id="weekTips">€0.00</div>
            <div class="stat-sub" id="weekHours">0.0 Hours</div>
        </div>
        <div class="stat-card">
            <h3>Monthly Total</h3>
            <div class="stat-val" id="monthTips">€0.00</div>
            <div class="stat-sub" id="monthHours">0.0 Hours</div>
        </div>
    </div>

    <button class="pdf-btn" onclick="downloadPDF()">📄 Download Monthly Report (PDF)</button>

    <table>
        <thead><tr><th>Date</th><th>Hours</th><th>Tips</th><th>Actions</th></tr></thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<script>
    let shifts = JSON.parse(localStorage.getItem('shifts')) || [];
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function handleEntry() {
        const dateVal = document.getElementById('date').value;
        const hours = parseFloat(document.getElementById('hours').value) || 0;
        const tips = parseFloat(document.getElementById('tips').value) || 0;
        const editIndex = parseInt(document.getElementById('editIndex').value);
        if (!dateVal) return alert("Please select a date");
        
        const shiftData = { date: dateVal, hours, tips };
        if (editIndex === -1) shifts.push(shiftData);
        else shifts[editIndex] = shiftData;

        saveData();
        resetForm();
    }

    function saveData() {
        shifts.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('shifts', JSON.stringify(shifts));
        populateMonthSelector();
        updateUI();
    }

    function populateMonthSelector() {
        const selector = document.getElementById('monthSelector');
        const currentSelection = selector.value;
        const monthsInHistory = new Set();
        const now = new Date();
        monthsInHistory.add(`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`);
        shifts.forEach(s => monthsInHistory.add(s.date.substring(0, 7)));

        const sortedMonths = Array.from(monthsInHistory).sort().reverse();
        selector.innerHTML = sortedMonths.map(m => {
            const [year, month] = m.split('-');
            return `<option value="${m}">${monthNames[parseInt(month)-1]} ${year}</option>`;
        }).join('');

        if (currentSelection && monthsInHistory.has(currentSelection)) selector.value = currentSelection;
    }

    function updateUI() {
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';
        const selectedMonthVal = document.getElementById('monthSelector').value;
        const [selYear, selMonth] = selectedMonthVal.split('-').map(Number);
        
        let mTips = 0, mHours = 0, wTips = 0, wHours = 0;

        const now = new Date();
        const day = now.getDay();
        const diff = now.getDate() - day + (day === 0 ? -6 : 1);
        const startOfWeek = new Date(new Date(now).setDate(diff));
        startOfWeek.setHours(0,0,0,0);
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);

        shifts.forEach((shift, index) => {
            const sDate = new Date(shift.date + 'T00:00:00');
            if (sDate.getMonth() + 1 === selMonth && sDate.getFullYear() === selYear) {
                mTips += shift.tips; mHours += shift.hours;
            }
            if (sDate >= startOfWeek && sDate <= endOfWeek) {
                wTips += shift.tips; wHours += shift.hours;
            }
            tbody.innerHTML += `<tr>
                <td><b>${shift.date}</b></td>
                <td>${shift.hours}h</td>
                <td>€${shift.tips.toFixed(2)}</td>
                <td class="actions">
                    <span class="edit-link" onclick="editShift(${index})">Edit</span>
                    <span class="del-link" onclick="deleteShift(${index})">Delete</span>
                </td>
            </tr>`;
        });

        document.getElementById('monthTips').innerText = `€${mTips.toFixed(2)}`;
        document.getElementById('monthHours').innerText = `${mHours.toFixed(1)} Hours Total`;
        document.getElementById('weekTips').innerText = `€${wTips.toFixed(2)}`;
        document.getElementById('weekHours').innerText = `${wHours.toFixed(1)} Hours This Week`;
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const selectedLabel = document.getElementById('monthSelector').selectedOptions[0].text;
        const mTips = document.getElementById('monthTips').innerText;
        const mHours = document.getElementById('monthHours').innerText;
        
        // Header
        doc.setFontSize(22);
        doc.setTextColor(26, 115, 232);
        doc.text("Shift & Tip Report", 14, 20);
        
        doc.setFontSize(12);
        doc.setTextColor(100);
        doc.text(`Month: ${selectedLabel}`, 14, 30);
        
        // Summary Box
        doc.setDrawColor(200);
        doc.rect(14, 35, 182, 25);
        doc.setTextColor(0);
        doc.text(`Total Monthly Tips: ${mTips}`, 20, 45);
        doc.text(`Total Monthly Hours: ${mHours}`, 20, 53);

        // Filter data for the table (Only selected month)
        const selectedMonthVal = document.getElementById('monthSelector').value;
        const tableData = shifts
            .filter(s => s.date.startsWith(selectedMonthVal))
            .map(s => [s.date, `${s.hours}h`, `€${s.tips.toFixed(2)}`]);

        doc.autoTable({
            startY: 70,
            head: [['Date', 'Hours Worked', 'Tips Received']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [26, 115, 232] }
        });

        doc.save(`Tips_Report_${selectedMonthVal}.pdf`);
    }

    function editShift(index) {
        const s = shifts[index];
        document.getElementById('date').value = s.date;
        document.getElementById('hours').value = s.hours;
        document.getElementById('tips').value = s.tips;
        document.getElementById('editIndex').value = index;
        document.getElementById('mainBtn').innerText = "Update Entry";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    function deleteShift(index) {
        if(confirm("Delete this entry?")) { shifts.splice(index, 1); saveData(); }
    }

    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('hours').value = "";
        document.getElementById('tips').value = "";
        document.getElementById('editIndex').value = "-1";
        document.getElementById('mainBtn').innerText = "Add Shift";
        document.getElementById('cancelBtn').style.display = "none";
    }

    document.getElementById('date').valueAsDate = new Date();
    populateMonthSelector();
    updateUI();
</script>
</body>
</html>
