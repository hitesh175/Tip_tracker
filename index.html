<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Tips Tracker</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* Theme Variables */
        :root {
            --accent: #7b2ff7;
            --accent-soft: #f3ebff;
            --bg: #fdfdff;
            --text: #1d1d1f;
            --text-light: #86868b;
            --card: #ffffff;
            --success: #34c759;
            --input-bg: #f5f5f7;
            --border: #f2f2f7;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --text: #ffffff;
            --text-light: #a1a1a6;
            --card: #1c1c1e;
            --accent-soft: #2c1a4d;
            --input-bg: #2c2c2e;
            --border: #38383a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 15px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container { width: 100%; max-width: 450px; }

        header { 
            margin: 20px 0 20px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }

        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--accent-soft);
            color: var(--accent);
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }

        .input-card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .row { display: flex; gap: 12px; margin-bottom: 15px; }
        .group { flex: 1; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-light); margin-bottom: 6px; text-transform: uppercase; }
        
        input, select {
            background: var(--input-bg);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            color: var(--text);
        }

        .btn-main {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box {
            background: var(--accent-soft);
            padding: 20px;
            border-radius: 22px;
            text-align: center;
        }
        .stat-box.alt { background: var(--input-bg); }
        .stat-label { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .stat-box.alt .stat-label { color: var(--text-light); }
        .stat-val { font-size: 20px; font-weight: 800; display: block; margin-top: 4px;}
        .stat-hours { font-size: 13px; color: var(--text-light); font-weight: 600; margin-top: 2px; }

        .history-item {
            background: var(--card);
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }
        .h-date { font-weight: 700; font-size: 15px; display: block; }
        .h-time { font-size: 13px; color: var(--text-light); }
        .h-amt { color: var(--success); font-weight: 800; font-size: 18px; }
        
        .actions { margin-top: 8px; }
        .act-btn { font-size: 12px; font-weight: 700; text-decoration: none; margin-right: 12px; cursor: pointer; }
        .edit { color: var(--accent); }
        .delete { color: #ff3b30; }

        #monthSelector { 
            background: none; 
            font-weight: 700; 
            padding: 0; 
            margin-bottom: 20px; 
            color: var(--accent); 
            width: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Tips 💰</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
    </header>

    <div class="input-card">
        <div class="group" style="margin-bottom:15px;">
            <label>Shift Date</label>
            <input type="date" id="date">
        </div>
        <div class="row">
            <div class="group"><label>Hours</label><input type="number" id="h_part" placeholder="0"></div>
            <div class="group"><label>Mins</label><input type="number" id="m_part" placeholder="0" max="59"></div>
        </div>
        <div class="group" style="margin-bottom:20px;">
            <label>Tips (€)</label>
            <input type="number" id="tips" step="0.01" placeholder="0.00">
        </div>
        <input type="hidden" id="editIndex" value="-1">
        <button id="mainBtn" class="btn-main" onclick="handleEntry()">Save Shift</button>
        <button id="cancelBtn" style="display:none; background:none; color:var(--text-light); border:none; width:100%; margin-top:10px; cursor:pointer;" onclick="resetForm()">Cancel</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <select id="monthSelector" onchange="updateUI()"></select>
        <a href="#" style="font-size: 13px; color: var(--text-light); text-decoration:none;" onclick="downloadPDF()">Export PDF</a>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">This Week</div>
            <div id="weekTips" class="stat-val">€0.00</div>
            <div id="weekHours" class="stat-hours">0h 0m</div>
        </div>
        <div class="stat-box alt">
            <div class="stat-label">Month Total</div>
            <div id="monthTips" class="stat-val">€0.00</div>
            <div id="monthHours" class="stat-hours">0h 0m</div>
        </div>
    </div>

    <div id="historyBody"></div>
</div>

<script>
    let shifts = JSON.parse(localStorage.getItem('my_local_tips')) || [];

    // --- Theme Logic ---
    function toggleTheme() {
        const body = document.documentElement;
        const current = body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'dark' ? '☀️ Light' : '🌙 Dark';
        localStorage.setItem('my_tip_theme', next);
    }

    // Load saved theme on startup
    const savedTheme = localStorage.getItem('my_tip_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? '☀️ Light' : '🌙 Dark';

    // --- App Logic ---
    function formatTime(decimalHours) {
        const h = Math.floor(decimalHours);
        const m = Math.round((decimalHours - h) * 60);
        return `${h}h ${m}m`;
    }

    function handleEntry() {
        const dateVal = document.getElementById('date').value;
        const h = parseInt(document.getElementById('h_part').value) || 0;
        const m = parseInt(document.getElementById('m_part').value) || 0;
        const tips = parseFloat(document.getElementById('tips').value) || 0;
        const editIndex = parseInt(document.getElementById('editIndex').value);
        
        if (!dateVal) return alert("Select a date");
        const entry = { date: dateVal, hours: h + (m/60), tips: tips };

        if (editIndex === -1) {
            shifts.push(entry);
        } else {
            shifts[editIndex] = entry;
        }

        saveAndRefresh();
        resetForm();
    }

    function saveAndRefresh() {
        shifts.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('my_local_tips', JSON.stringify(shifts));
        populateMonthSelector();
        updateUI();
    }

    function updateUI() {
        const container = document.getElementById('historyBody');
        container.innerHTML = '';
        const selMonth = document.getElementById('monthSelector').value;
        if(!selMonth) return;
        
        let mTips = 0, mHours = 0, wTips = 0, wHours = 0;
        const now = new Date();
        const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1))).setHours(0,0,0,0);

        shifts.forEach((s, index) => {
            const sDate = new Date(s.date + 'T00:00:00');
            if (s.date.startsWith(selMonth)) {
                mTips += s.tips;
                mHours += s.hours;
            }
            if (sDate >= startOfWeek) {
                wTips += s.tips;
                wHours += s.hours;
            }
            
            if (s.date.startsWith(selMonth)) {
                container.innerHTML += `
                    <div class="history-item">
                        <div>
                            <span class="h-date">${s.date}</span>
                            <span class="h-time">${formatTime(s.hours)} shift</span>
                            <div class="actions">
                                <span class="act-btn edit" onclick="editShift(${index})">Edit</span>
                                <span class="act-btn delete" onclick="deleteShift(${index})">Delete</span>
                            </div>
                        </div>
                        <div class="h-amt">€${s.tips.toFixed(2)}</div>
                    </div>`;
            }
        });
        
        document.getElementById('monthTips').innerText = `€${mTips.toFixed(2)}`;
        document.getElementById('monthHours').innerText = `${formatTime(mHours)}`;
        document.getElementById('weekTips').innerText = `€${wTips.toFixed(2)}`;
        document.getElementById('weekHours').innerText = `${formatTime(wHours)}`;
    }

    function populateMonthSelector() {
        const selector = document.getElementById('monthSelector');
        const months = new Set([new Date().toISOString().substring(0,7)]);
        shifts.forEach(s => months.add(s.date.substring(0,7)));
        const current = selector.value;
        selector.innerHTML = Array.from(months).sort().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
        if(current) selector.value = current;
    }

    function editShift(index) {
        const s = shifts[index];
        document.getElementById('date').value = s.date;
        document.getElementById('h_part').value = Math.floor(s.hours);
        document.getElementById('m_part').value = Math.round((s.hours - Math.floor(s.hours)) * 60);
        document.getElementById('tips').value = s.tips;
        document.getElementById('editIndex').value = index;
        document.getElementById('mainBtn').innerText = "Update Entry";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    function deleteShift(index) {
        if(confirm("Delete this?")) {
            shifts.splice(index, 1);
            saveAndRefresh();
        }
    }
    
    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('h_part').value = ""; document.getElementById('m_part').value = "";
        document.getElementById('tips').value = ""; document.getElementById('editIndex').value = "-1";
        document.getElementById('mainBtn').innerText = "Save Shift";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selMonth = document.getElementById('monthSelector').value;
        doc.setFontSize(20);
        doc.text(`Earnings Summary: ${selMonth}`, 14, 20);
        const monthShifts = shifts.filter(s => s.date.startsWith(selMonth));
        let tT = 0, tH = 0;
        const data = monthShifts.map(s => {
            tT += s.tips; tH += s.hours;
            return [s.date, formatTime(s.hours), `€${s.tips.toFixed(2)}`];
        });
        data.push([{content: 'MONTHLY TOTAL', styles: {fontStyle: 'bold'}}, formatTime(tH), `€${tT.toFixed(2)}`]);
        doc.autoTable({ startY: 30, head: [['Date', 'Hours', 'Tips']], body: data });
        doc.save(`Tips_${selMonth}.pdf`);
    }

    document.getElementById('date').valueAsDate = new Date();
    saveAndRefresh();
</script>
</body>
</html>
