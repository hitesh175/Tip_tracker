<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Tracker Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --accent: #4895ef;
            --text: #2b2d42;
            --danger: #ef233c;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 15px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container { width: 100%; max-width: 500px; }

        header { margin: 20px 0; text-align: center; }
        header h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0; }

        /* Modern Card Style */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }

        label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #8d99ae; margin-bottom: 6px; display: block; }
        
        input, select {
            background: #f8f9fa;
            border: 2px solid #edf2f4;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            color: var(--text);
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; background: white; }

        button {
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }

        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-pdf { background: #edf2f4; color: var(--text); font-size: 0.85rem; width: 100%; margin-bottom: 20px; }

        /* Stats Design */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px;
            border-radius: 18px;
            text-align: center;
        }
        .stat-card.alt { background: white; color: var(--text); border: 2px solid #edf2f4; }
        .stat-title { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; font-weight: 800; }
        .stat-val { font-size: 1.4rem; font-weight: 800; margin: 4px 0; }
        .stat-sub { font-size: 0.75rem; opacity: 0.9; }

        /* List Design */
        .entry-item {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #edf2f4;
        }
        .entry-info b { display: block; font-size: 0.95rem; }
        .entry-info span { font-size: 0.8rem; color: #8d99ae; }
        .entry-amount { text-align: right; }
        .amt-tips { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
        .entry-actions { font-size: 0.75rem; margin-top: 5px; }
        .action-edit { color: var(--accent); margin-right: 10px; text-decoration: none; font-weight: 700; }
        .action-del { color: var(--danger); text-decoration: none; font-weight: 700; }

        #monthSelector { margin-bottom: 15px; border-radius: 12px; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>TipTracker Cloud</h1>
    </header>

    <div class="card">
        <div class="input-grid">
            <div class="form-group full-width">
                <label>Date</label>
                <input type="date" id="date">
            </div>
            <div class="form-group">
                <label>Hours</label>
                <input type="number" id="h_part" placeholder="0">
            </div>
            <div class="form-group">
                <label>Minutes</label>
                <input type="number" id="m_part" placeholder="0">
            </div>
            <div class="form-group full-width">
                <label>Tips Earned (€)</label>
                <input type="number" id="tips" step="0.01" placeholder="0.00">
            </div>
        </div>
        <input type="hidden" id="editDocId" value="">
        <button id="mainBtn" class="btn-primary" onclick="handleEntry()">Save Shift</button>
        <button id="cancelBtn" style="display:none; background:#8d99ae; color:white; width:100%; margin-top:5px;" onclick="resetForm()">Cancel</button>
    </div>

    <select id="monthSelector" onchange="updateUI()"></select>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-title">Weekly Tips</div>
            <div class="stat-val" id="weekTips">€0.00</div>
            <div class="stat-sub" id="weekHours">0h 0m</div>
        </div>
        <div class="stat-card alt">
            <div class="stat-title" style="color: #8d99ae;">Monthly Total</div>
            <div class="stat-val" id="monthTips" style="color: var(--primary);">€0.00</div>
            <div class="stat-sub" id="monthHours">0h 0m</div>
        </div>
    </div>

    <button class="btn-pdf" onclick="downloadPDF()">📄 Export Monthly Report (PDF)</button>

    <div id="historyBody">
        </div>
</div>

<script>
    // COPY AND PASTE YOUR CONFIG FROM FIREBASE CONSOLE HERE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let shifts = [];

    function formatTime(decimalHours) {
        const h = Math.floor(decimalHours);
        const m = Math.round((decimalHours - h) * 60);
        return `${h}h ${m}m`;
    }

    function loadData() {
        db.collection("shifts").orderBy("date", "desc").onSnapshot((snapshot) => {
            shifts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            populateMonthSelector();
            updateUI();
        });
    }

    async function handleEntry() {
        const dateVal = document.getElementById('date').value;
        const h = parseInt(document.getElementById('h_part').value) || 0;
        const m = parseInt(document.getElementById('m_part').value) || 0;
        const tips = parseFloat(document.getElementById('tips').value) || 0;
        const editDocId = document.getElementById('editDocId').value;
        if (!dateVal) return alert("Select a date");
        const data = { date: dateVal, hours: h + (m / 60), tips: tips };
        if (editDocId) await db.collection("shifts").doc(editDocId).update(data);
        else await db.collection("shifts").add(data);
        resetForm();
    }

    function updateUI() {
        const container = document.getElementById('historyBody');
        container.innerHTML = '';
        const selMonth = document.getElementById('monthSelector').value;
        if(!selMonth) return;
        let mTips = 0, mHours = 0, wTips = 0, wHours = 0;
        const now = new Date();
        const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1))).setHours(0,0,0,0);

        shifts.forEach((s) => {
            const sDate = new Date(s.date + 'T00:00:00');
            if (s.date.startsWith(selMonth)) { mTips += s.tips; mHours += s.hours; }
            if (sDate >= startOfWeek) { wTips += s.tips; wHours += s.hours; }
            
            container.innerHTML += `
                <div class="entry-item">
                    <div class="entry-info">
                        <b>${s.date}</b>
                        <span>${formatTime(s.hours)} worked</span>
                        <div class="entry-actions">
                            <a href="#" class="action-edit" onclick="editShift('${s.id}')">Edit</a>
                            <a href="#" class="action-del" onclick="deleteShift('${s.id}')">Delete</a>
                        </div>
                    </div>
                    <div class="entry-amount">
                        <div class="amt-tips">€${s.tips.toFixed(2)}</div>
                    </div>
                </div>`;
        });
        document.getElementById('monthTips').innerText = `€${mTips.toFixed(2)}`;
        document.getElementById('monthHours').innerText = formatTime(mHours);
        document.getElementById('weekTips').innerText = `€${wTips.toFixed(2)}`;
        document.getElementById('weekHours').innerText = formatTime(wHours);
    }

    function populateMonthSelector() {
        const selector = document.getElementById('monthSelector');
        const months = new Set([new Date().toISOString().substring(0,7)]);
        shifts.forEach(s => months.add(s.date.substring(0,7)));
        const current = selector.value;
        selector.innerHTML = Array.from(months).sort().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
        if(current) selector.value = current;
    }

    function editShift(id) {
        const s = shifts.find(x => x.id === id);
        document.getElementById('date').value = s.date;
        document.getElementById('h_part').value = Math.floor(s.hours);
        document.getElementById('m_part').value = Math.round((s.hours - Math.floor(s.hours)) * 60);
        document.getElementById('tips').value = s.tips;
        document.getElementById('editDocId').value = s.id;
        document.getElementById('mainBtn').innerText = "Update Shift";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    function deleteShift(id) { if(confirm("Delete this?")) db.collection("shifts").doc(id).delete(); }
    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('h_part').value = ""; document.getElementById('m_part').value = "";
        document.getElementById('tips').value = ""; document.getElementById('editDocId').value = "";
        document.getElementById('mainBtn').innerText = "Save Shift";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selMonth = document.getElementById('monthSelector').value;
        doc.text(`Tip Report: ${selMonth}`, 14, 20);
        const data = shifts.filter(s => s.date.startsWith(selMonth)).map(s => [s.date, formatTime(s.hours), `€${s.tips.toFixed(2)}`]);
        doc.autoTable({ startY: 30, head: [['Date', 'Time', 'Tips']], body: data });
        doc.save(`Tips_${selMonth}.pdf`);
    }

    document.getElementById('date').valueAsDate = new Date();
    loadData();
</script>
</body>
</html>
