<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Earnings Tracker</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --accent: #7b2ff7;
            --bg: #fdfdff;
            --text: #1d1d1f;
            --text-muted: #86868b;
            --card: #ffffff;
            --border: #f2f2f7;
            --weekly-bg: #f3ebff;
            --success: #34c759;
            --blue-track: #007aff;
            --blue-soft: #e5f1ff;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #8e8e93;
            --card: #1c1c1e;
            --border: #2c2c2e;
            --weekly-bg: #2c1a4d;
            --blue-soft: #0a2540;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s ease;
        }

        .container { width: 100%; max-width: 400px; }

        header { margin: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        
        .input-section {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        input {
            background: rgba(120, 120, 128, 0.1);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            width: 100%;
            color: var(--text);
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .decimal-preview {
            font-size: 11px;
            color: var(--accent);
            font-weight: 700;
            margin-top: -8px;
            margin-bottom: 12px;
            display: block;
            text-align: right;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
        }

        /* Monthly Summary Divided Card */
        .summary-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .summary-split { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: center; }
        .split-box.tips { color: var(--accent); }
        .split-box.salary { color: var(--blue-track); }
        .split-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .split-val { font-size: 22px; font-weight: 800; margin: 4px 0; display: block; }
        .split-hours { font-size: 12px; color: var(--text-muted); }

        /* Weekly Stats Layout */
        .weekly-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .weekly-box { padding: 15px; border-radius: 16px; }
        .weekly-box.tips { background: var(--weekly-bg); border: 1px solid var(--accent); }
        .weekly-box.salary { background: var(--blue-soft); border: 1px solid var(--blue-track); }
        .weekly-title { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .weekly-box.tips .weekly-title { color: var(--accent); }
        .weekly-box.salary .weekly-title { color: var(--blue-track); }
        .weekly-amount { font-size: 16px; font-weight: 800; }

        /* Streamlined History Cards */
        .history-card {
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .date-label { font-weight: 700; font-size: 16px; }
        .meta-label { font-size: 13px; color: var(--text-muted); }
        
        .values-column { text-align: right; }
        .row-salary { font-size: 14px; font-weight: 700; color: var(--blue-track); }
        .row-tips { font-size: 14px; font-weight: 700; color: var(--success); margin-top: 2px; }

        .action-links { margin-top: 8px; font-size: 12px; }
        .action-links span { margin-right: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">My Tracker</h2>
        <button onclick="toggleTheme()" style="border:none; background:none; font-size:20px">🌓</button>
    </header>

    <div class="input-section">
        <label style="font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 5px; display: block;">DATE</label>
        <input type="date" id="date">
        
        <label style="font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 5px; display: block;">DURATION (HH:MM)</label>
        <div style="display:flex; gap:10px">
            <input type="number" id="h_part" placeholder="Hrs" oninput="updateDecimalPreview()">
            <input type="number" id="m_part" placeholder="Mins" oninput="updateDecimalPreview()">
        </div>
        <span class="decimal-preview" id="decPreview">Total: 0.00 hours</span>

        <label style="font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 5px; display: block;">TIPS EARNED (€)</label>
        <input type="number" id="tips" step="0.01" placeholder="0.00">
        
        <input type="hidden" id="editIndex" value="-1">
        <button id="mainBtn" class="btn-save" onclick="handleEntry()">Save Shift</button>
    </div>

    <div class="summary-card">
        <div class="summary-split">
            <div class="split-box tips">
                <div class="split-label">Monthly Tips</div>
                <span class="split-val" id="monthTips">€0.00</span>
                <span class="split-hours" id="monthHours">0.00h</span>
            </div>
            <div style="width: 1px; background: var(--border); height: 100%;"></div>
            <div class="split-box salary">
                <div class="split-label">Monthly Net Pay</div>
                <span class="split-val" id="monthNetBase">€0.00</span>
                <span class="split-hours" style="visibility: hidden;">placeholder</span>
            </div>
        </div>
    </div>

    <div class="weekly-grid">
        <div class="weekly-box tips">
            <div class="weekly-title">Weekly Tips</div>
            <div class="weekly-amount" id="weekTips">€0.00</div>
            <div style="font-size: 11px; color: var(--text-muted);" id="weekHours">0.00h</div>
        </div>
        <div class="weekly-box salary">
            <div class="weekly-title">Weekly Net Pay</div>
            <div class="weekly-amount" id="weekNetBase">€0.00</div>
            <div style="font-size: 11px; color: var(--text-muted);">After 10% tax</div>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
        <select id="monthSelector" onchange="updateUI()" style="background:none; border:none; font-weight:700; color:var(--accent); font-size: 15px;"></select>
        <span onclick="downloadPDF()" style="font-size:12px; color:var(--text-muted); cursor:pointer">Export PDF</span>
    </div>

    <div id="historyBody"></div>
</div>

<script>
    const HOURLY_RATE = 13.90;
    const TAX_MULTIPLIER = 0.90; // 10% tax cut applied to base wage
    
    let shifts = JSON.parse(localStorage.getItem('my_local_tips')) || [];

    function updateDecimalPreview() {
        const h = parseInt(document.getElementById('h_part').value) || 0;
        const m = parseInt(document.getElementById('m_part').value) || 0;
        const decimalTotal = h + (m / 60);
        document.getElementById('decPreview').innerText = `Total: ${decimalTotal.toFixed(2)} hours`;
    }

    function formatTime(decimalHours) {
        const h = Math.floor(decimalHours);
        const m = Math.round((decimalHours - h) * 60);
        return `${h}h ${m}m (${decimalHours.toFixed(2)})`;
    }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('my_tip_theme', next);
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('my_tip_theme') || 'light');

    function handleEntry() {
        const d = document.getElementById('date').value;
        const h = (parseInt(document.getElementById('h_part').value) || 0) + ((parseInt(document.getElementById('m_part').value) || 0) / 60);
        const t = parseFloat(document.getElementById('tips').value) || 0;
        const idx = parseInt(document.getElementById('editIndex').value);
        if (!d) return;
        
        const entry = { date: d, hours: h, tips: t };
        if (idx === -1) shifts.push(entry); else shifts[idx] = entry;
        
        saveAndRefresh();
        resetForm();
    }

    function updateUI() {
        const container = document.getElementById('historyBody');
        const sel = document.getElementById('monthSelector').value;
        container.innerHTML = '';
        
        let mTips = 0, mHours = 0, wTips = 0, wHours = 0;
        const now = new Date();
        const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1))).setHours(0,0,0,0);

        shifts.forEach((s, i) => {
            const sDate = new Date(s.date + 'T00:00:00');
            const dayNetBase = s.hours * HOURLY_RATE * TAX_MULTIPLIER;

            if (s.date.startsWith(sel)) {
                mTips += s.tips; mHours += s.hours;
                
                container.innerHTML += `
                    <div class="history-card">
                        <div>
                            <span class="date-label">${s.date}</span>
                            <span class="meta-label">${formatTime(s.hours)}</span>
                            <div class="action-links">
                                <span style="color:var(--accent)" onclick="editShift(${i})">Edit</span>
                                <span style="color:#ff3b30" onclick="deleteShift(${i})">Delete</span>
                            </div>
                        </div>
                        <div class="values-column">
                            <div class="row-salary">€${dayNetBase.toFixed(2)} <span style="font-size:10px; font-weight:normal; color:var(--text-muted)">pay</span></div>
                            <div class="row-tips">+€${s.tips.toFixed(2)} tips</div>
                        </div>
                    </div>`;
            }
            if (sDate >= startOfWeek) { wTips += s.tips; wHours += s.hours; }
        });

        const monthNetBase = mHours * HOURLY_RATE * TAX_MULTIPLIER;
        const weekNetBase = wHours * HOURLY_RATE * TAX_MULTIPLIER;

        // Populate separated metric fields
        document.getElementById('monthTips').innerText = `€${mTips.toFixed(2)}`;
        document.getElementById('monthNetBase').innerText = `€${monthNetBase.toFixed(2)}`;
        document.getElementById('monthHours').innerText = `${mHours.toFixed(2)}h total`;
        
        document.getElementById('weekHours').innerText = `${wHours.toFixed(2)}h total`;
        document.getElementById('weekTips').innerText = `€${wTips.toFixed(2)}`;
        document.getElementById('weekNetBase').innerText = `€${weekNetBase.toFixed(2)}`;
    }

    function editShift(i) {
        const s = shifts[i];
        document.getElementById('date').value = s.date;
        document.getElementById('h_part').value = Math.floor(s.hours);
        document.getElementById('m_part').value = Math.round((s.hours - Math.floor(s.hours)) * 60);
        document.getElementById('tips').value = s.tips;
        document.getElementById('editIndex').value = i;
        document.getElementById('mainBtn').innerText = "Update Shift";
        updateDecimalPreview();
        window.scrollTo(0,0);
    }

    function deleteShift(i) { if(confirm("Delete entry?")) { shifts.splice(i, 1); saveAndRefresh(); } }
    
    function saveAndRefresh() {
        shifts.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('my_local_tips', JSON.stringify(shifts));
        populateMonthSelector();
        updateUI();
    }
    
    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('h_part').value = ""; document.getElementById('m_part').value = "";
        document.getElementById('tips').value = ""; document.getElementById('editIndex').value = "-1";
        document.getElementById('mainBtn').innerText = "Save Shift";
        document.getElementById('decPreview').innerText = "Total: 0.00 hours";
    }
    
    function populateMonthSelector() {
        const selector = document.getElementById('monthSelector');
        const months = new Set([new Date().toISOString().substring(0,7)]);
        shifts.forEach(s => months.add(s.date.substring(0,7)));
        const current = selector.value;
        selector.innerHTML = Array.from(months).sort().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
        if(current) selector.value = current;
    }
    
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selMonth = document.getElementById('monthSelector').value;
        doc.text(`Divided Earnings Report: ${selMonth}`, 14, 20);
        
        let totalTips = 0, totalHours = 0;
        const data = shifts.filter(s => s.date.startsWith(selMonth)).map(s => {
            const netBase = s.hours * HOURLY_RATE * TAX_MULTIPLIER;
            totalTips += s.tips; totalHours += s.hours;
            return [s.date, s.hours.toFixed(2), `€${netBase.toFixed(2)}`, `€${s.tips.toFixed(2)}`];
        });
        
        const finalMonthBase = totalHours * HOURLY_RATE * TAX_MULTIPLIER;
        data.push([
            {content: 'TOTALS', styles: {fontStyle: 'bold'}}, 
            totalHours.toFixed(2), 
            `€${finalMonthBase.toFixed(2)}`, 
            `€${totalTips.toFixed(2)}`
        ]);

        doc.autoTable({ startY: 30, head: [['Date', 'Hours', 'Net Pay (Base)', 'Tips']], body: data });
        doc.save(`Separated_Report_${selMonth}.pdf`);
    }

    document.getElementById('date').valueAsDate = new Date();
    populateMonthSelector();
    updateUI();
</script>
</body>
</html>
