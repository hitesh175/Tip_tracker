<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Earnings Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --accent: #7b2ff7;
            --bg: #fdfdff;
            --text: #1d1d1f;
            --text-muted: #86868b;
            --card: #ffffff;
            --success: #34c759;
            --border: #f2f2f7;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #8e8e93;
            --card: #1c1c1e;
            --border: #2c2c2e;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        header { margin: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Input Section - More Compact */
        .input-section {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .forecast-text { font-size: 12px; color: var(--accent); margin-bottom: 15px; display: block; font-weight: 600; }

        input {
            background: rgba(120, 120, 128, 0.1);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            width: 100%;
            color: var(--text);
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
        }

        /* Hero Stats - The "Glanceable" Part */
        .hero-stats {
            background: var(--accent);
            color: white;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 25px;
        }
        .hero-label { font-size: 12px; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .hero-val { font-size: 36px; font-weight: 800; margin: 5px 0; }
        .hero-sub { font-size: 14px; opacity: 0.9; }

        /* History Items - Much Cleaner */
        .history-card {
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .date-label { font-weight: 700; font-size: 16px; margin-bottom: 2px; display: block; }
        .meta-label { font-size: 13px; color: var(--text-muted); }
        
        .amount-group { text-align: right; }
        .total-amount { font-size: 18px; font-weight: 700; color: var(--text); }
        .tip-amount { font-size: 13px; color: var(--success); font-weight: 600; }

        .action-links { margin-top: 8px; font-size: 12px; }
        .action-links span { margin-right: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">Tracker</h2>
        <div style="display:flex; gap:10px">
            <button onclick="backupData()" style="border:none; background:none; font-size:20px">💾</button>
            <button onclick="toggleTheme()" style="border:none; background:none; font-size:20px">🌓</button>
        </div>
    </header>

    <div class="input-section">
        <span id="forecast" class="forecast-text">Estimate: --</span>
        <input type="date" id="date">
        <div style="display:flex; gap:10px">
            <input type="number" id="h_part" placeholder="Hrs" oninput="calculateForecast()">
            <input type="number" id="m_part" placeholder="Mins" oninput="calculateForecast()">
        </div>
        <input type="number" id="tips" step="0.01" placeholder="Tips Received (€)">
        <input type="hidden" id="editIndex" value="-1">
        <button id="mainBtn" class="btn-save" onclick="handleEntry()">Save Shift</button>
    </div>

    <div class="hero-stats">
        <div class="hero-label">April Income</div>
        <div class="hero-val" id="monthTotal">€0.00</div>
        <div class="hero-sub"><span id="monthHours">0h</span> • <span id="monthTips">€0.00</span> in tips</div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
        <select id="monthSelector" onchange="updateUI()" style="background:none; border:none; font-weight:700; color:var(--accent)"></select>
        <span onclick="downloadPDF()" style="font-size:12px; color:var(--text-muted); cursor:pointer">Export PDF</span>
    </div>

    <div id="historyBody"></div>
</div>

<script>
    const BASE_PAY = 13.90;
    let shifts = JSON.parse(localStorage.getItem('my_local_tips')) || [];

    // --- Core Funcs ---
    function formatTime(decimalHours) {
        const h = Math.floor(decimalHours);
        const m = Math.round((decimalHours - h) * 60);
        return `${h}h ${m}m`;
    }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('my_tip_theme', next);
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('my_tip_theme') || 'light');

    function calculateForecast() {
        const h = (parseInt(document.getElementById('h_part').value) || 0) + ((parseInt(document.getElementById('m_part').value) || 0) / 60);
        if (h > 0 && shifts.length > 0) {
            const avg = shifts.reduce((a, b) => a + b.tips, 0) / shifts.reduce((a, b) => a + b.hours, 0);
            document.getElementById('forecast').innerText = `Est. Tips: €${(avg * h).toFixed(2)}`;
        }
    }

    function handleEntry() {
        const d = document.getElementById('date').value;
        const h = (parseInt(document.getElementById('h_part').value) || 0) + ((parseInt(document.getElementById('m_part').value) || 0) / 60);
        const t = parseFloat(document.getElementById('tips').value) || 0;
        const idx = parseInt(document.getElementById('editIndex').value);
        if (!d) return;
        
        const entry = { date: d, hours: h, tips: t };
        if (idx === -1) shifts.push(entry); else shifts[idx] = entry;
        
        shifts.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('my_local_tips', JSON.stringify(shifts));
        populateMonthSelector();
        updateUI();
        resetForm();
    }

    function updateUI() {
        const container = document.getElementById('historyBody');
        const sel = document.getElementById('monthSelector').value;
        container.innerHTML = '';
        let totalG = 0, totalT = 0, totalH = 0;

        shifts.forEach((s, i) => {
            if (s.date.startsWith(sel)) {
                const dayG = (s.hours * BASE_PAY) + s.tips;
                totalG += dayG; totalT += s.tips; totalH += s.hours;

                container.innerHTML += `
                    <div class="history-card">
                        <div>
                            <span class="date-label">${s.date}</span>
                            <span class="meta-label">${formatTime(s.hours)} worked</span>
                            <div class="action-links">
                                <span style="color:var(--accent)" onclick="editShift(${i})">Edit</span>
                                <span style="color:#ff3b30" onclick="deleteShift(${i})">Delete</span>
                            </div>
                        </div>
                        <div class="amount-group">
                            <div class="total-amount">€${dayG.toFixed(2)}</div>
                            <div class="tip-amount">+€${s.tips.toFixed(2)} tips</div>
                        </div>
                    </div>`;
            }
        });
        document.getElementById('monthTotal').innerText = `€${totalG.toFixed(2)}`;
        document.getElementById('monthTips').innerText = `€${totalT.toFixed(2)}`;
        document.getElementById('monthHours').innerText = formatTime(totalH);
    }

    function editShift(i) {
        const s = shifts[i];
        document.getElementById('date').value = s.date;
        document.getElementById('h_part').value = Math.floor(s.hours);
        document.getElementById('m_part').value = Math.round((s.hours - Math.floor(s.hours)) * 60);
        document.getElementById('tips').value = s.tips;
        document.getElementById('editIndex').value = i;
        document.getElementById('mainBtn').innerText = "Update Entry";
        window.scrollTo(0,0);
    }

    function deleteShift(i) { if(confirm("Delete?")) { shifts.splice(i, 1); updateUI(); } }
    
    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('h_part').value = ""; document.getElementById('m_part').value = "";
        document.getElementById('tips').value = ""; document.getElementById('editIndex').value = "-1";
        document.getElementById('mainBtn').innerText = "Save Shift";
    }

    function populateMonthSelector() {
        const selector = document.getElementById('monthSelector');
        const months = new Set([new Date().toISOString().substring(0,7)]);
        shifts.forEach(s => months.add(s.date.substring(0,7)));
        const current = selector.value;
        selector.innerHTML = Array.from(months).sort().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
        if(current) selector.value = current;
    }

    function backupData() {
        const link = document.createElement('a');
        link.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(shifts));
        link.download = "tips_backup.json";
        link.click();
    }

    document.getElementById('date').valueAsDate = new Date();
    populateMonthSelector();
    updateUI();
</script>
</body>
</html>
